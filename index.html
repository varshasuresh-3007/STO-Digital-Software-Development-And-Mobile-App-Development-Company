    <script>
        function show_snackbar(e) {
            var x = document.getElementById("snackbar");
            if (x) {
                x.className = "show";
                $('#snackbar').html(e);
                setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
            }
        }
        function show_snackbar_error(e) {
            var x = document.getElementById("snackbar_error");
            if (x) {
                x.className = "show";
                $('#snackbar_error').html(e);
                setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);

        }
    </script>

    <script type="text/javascript">
        // Reset language to EN on fresh session (browser reopened / new visit)
        if (document.cookie.indexOf('sto_session=active') === -1) {
            localStorage.setItem('siteLanguage', 'en');
            document.cookie = 'sto_session=active; path=/;';
        }

        // Ensure language defaults to EN if no language is selected yet
        let savedLanguage = localStorage.getItem('siteLanguage');
        if (!savedLanguage) {
            savedLanguage = 'en';
            localStorage.setItem('siteLanguage', 'en');
        }

        if (savedLanguage === 'en') {
            // Clear Translate cookies if language is English
            const hostname = window.location.hostname;
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + hostname + ';';
            const parts = hostname.split('.');
            if (parts.length > 1) {
                const rootDomain = '.' + parts.slice(-2).join('.');
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + rootDomain + ';';
            }
            localStorage.removeItem('googtrans');
        }
    </script>
